<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cahn–Hilliard · Phase Separation on the GPU</title>
  <meta name="description" content="Interactive WebGL2 simulation of the Cahn–Hilliard equation — spinodal decomposition and capillary phase separation, running in real time on the GPU." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="sim"></canvas>

  <aside id="panel">
    <header>
      <h1>Cahn–Hilliard</h1>
      <p class="sub">Phase separation on the GPU</p>
    </header>

    <div class="row buttons">
      <button id="playPause" class="primary">⏸ Pause</button>
      <button id="reset">↺ Reset</button>
    </div>

    <label class="ctl">
      <span>Composition <i id="meanVal">0.00</i></span>
      <input type="range" id="mean" min="-0.6" max="0.6" step="0.01" value="0" />
      <small>0 → labyrinth · offset → droplets</small>
    </label>

    <label class="ctl">
      <span>Interface width κ <i id="kappaVal">1.0</i></span>
      <input type="range" id="kappa" min="0.2" max="2.5" step="0.05" value="1.0" />
    </label>

    <label class="ctl">
      <span>Mobility M <i id="mobVal">1.0</i></span>
      <input type="range" id="mob" min="0.2" max="2.0" step="0.05" value="1.0" />
    </label>

    <label class="ctl">
      <span>Time step dt <i id="dtVal">0.025</i></span>
      <input type="range" id="dt" min="0.005" max="0.04" step="0.001" value="0.025" />
    </label>

    <label class="ctl">
      <span>Steps / frame <i id="subVal">25</i></span>
      <input type="range" id="sub" min="1" max="60" step="1" value="25" />
    </label>

    <label class="ctl">
      <span>Colormap</span>
      <select id="cmap">
        <option value="0">Viridis</option>
        <option value="1">Magma</option>
        <option value="2">Inferno</option>
        <option value="3">Ink (two-tone)</option>
        <option value="4">Gold / Teal</option>
      </select>
    </label>

    <p class="hint">Drag on the canvas to paint phase. ⟨space⟩ play/pause · ⟨r⟩ reset</p>
    <footer>
      <a href="https://github.com/DmitryLobuznov/cahn-hilliard" target="_blank" rel="noopener">source ↗</a>
      <span id="fps"></span>
    </footer>
  </aside>

  <script src="js/main.js"></script>
</body>
</html>
