<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rayleigh–Plateau · Jet Break-up on the GPU</title>
  <meta name="description" content="Interactive WebGL2 Rayleigh–Plateau instability — a liquid jet pinches into droplets under surface tension, in real time on the GPU." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="sim"></canvas>

  <aside id="panel">
    <header>
      <h1>Rayleigh–Plateau</h1>
      <p class="sub">A jet breaks into beads</p>
    </header>

    <div class="row buttons">
      <button id="playPause" class="primary">⏸ Pause</button>
      <button id="reset">↺ New jet</button>
    </div>

    <label class="ctl">
      <span>Droplets <i id="dropsVal">4</i></span>
      <input type="range" id="drops" min="2" max="6" step="1" value="4" />
      <small>waves along the column — sets how many beads form</small>
    </label>

    <label class="ctl">
      <span>Viscosity ν <i id="viscVal">0.15</i></span>
      <input type="range" id="visc" min="0.05" max="0.5" step="0.01" value="0.15" />
      <small>thick syrup pinches slowly &amp; smoothly</small>
    </label>

    <label class="ctl">
      <span>Steps / frame <i id="subVal">4</i></span>
      <input type="range" id="sub" min="1" max="12" step="1" value="4" />
    </label>

    <label class="ctl">
      <span>Look</span>
      <select id="cmap">
        <option value="0">Water</option>
        <option value="1">Gold</option>
        <option value="2">Mercury</option>
        <option value="3">Magma</option>
      </select>
    </label>

    <p class="hint">The column auto-resets after it pinches. ⟨space⟩ play/pause · ⟨r⟩ new jet</p>
    <footer>
      <a href="../">← gallery</a>
      <a href="https://github.com/DmitryLobuznov/flow-gallery/tree/main/rayleigh-plateau" target="_blank" rel="noopener">source ↗</a>
      <span id="fps"></span>
    </footer>
  </aside>

  <script src="js/main.js"></script>
</body>
</html>
