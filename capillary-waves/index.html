<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capillary Waves · Ripples on the GPU</title>
  <meta name="description" content="Interactive WebGL2 ripple tank — gravity–capillary surface waves with dispersion, interference and damping, running in real time on the GPU." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="sim"></canvas>

  <aside id="panel">
    <header>
      <h1>Capillary Waves</h1>
      <p class="sub">Ripples on the GPU</p>
    </header>

    <div class="row buttons">
      <button id="rain" class="primary">🌧 Rain: on</button>
      <button id="reset">↺ Calm</button>
    </div>

    <label class="ctl">
      <span>Surface tension σ <i id="tensVal">0.40</i></span>
      <input type="range" id="tens" min="0.0" max="1.0" step="0.01" value="0.40" />
      <small>capillary stiffness — short ripples travel faster</small>
    </label>

    <label class="ctl">
      <span>Gravity g <i id="gravVal">0.30</i></span>
      <input type="range" id="grav" min="0.0" max="1.0" step="0.01" value="0.30" />
    </label>

    <label class="ctl">
      <span>Damping <i id="dampVal">0.6</i></span>
      <input type="range" id="damp" min="0.0" max="4.0" step="0.05" value="0.6" />
    </label>

    <label class="ctl">
      <span>Steps / frame <i id="subVal">3</i></span>
      <input type="range" id="sub" min="1" max="8" step="1" value="3" />
    </label>

    <label class="ctl">
      <span>Look</span>
      <select id="cmap">
        <option value="0">Caustic water</option>
        <option value="1">Ocean</option>
        <option value="2">Mercury</option>
        <option value="3">Schlieren</option>
      </select>
    </label>

    <p class="hint">Drag on the canvas to make waves. ⟨space⟩ rain on/off · ⟨r⟩ calm</p>
    <footer>
      <a href="../">← gallery</a>
      <a href="https://github.com/DmitryLobuznov/flow-gallery/tree/main/capillary-waves" target="_blank" rel="noopener">source ↗</a>
      <span id="fps"></span>
    </footer>
  </aside>

  <script src="js/main.js"></script>
</body>
</html>
